<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meta Ads Downloader & Analyzer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="header">
    <div class="header-logo">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <div>
        <h1>Ads Analyzer</h1>
        <p>Download <p>Ads Downloader — Meta Library</p> Analyze Meta Ads</p>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking page...</span>
  </div>

  <div class="body">
    <div id="mediaSection">
      <div class="section-label">Detected media</div>
      <div class="media-list" id="mediaList">
        <div class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <p id="emptyText">Open Meta Ads Library<br>to get started</p>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="openLibraryBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open Ads Library
      </button>
      <button class="btn btn-secondary" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh media
      </button>
    </div>

    <div class="divider"></div>
    <div class="watchlist-section">
      <div class="section-label">👁️ Competitor Watchlist</div>
      <textarea id="watchlistInput" placeholder="One competitor per line..." class="watchlist-textarea"></textarea>
      <button id="saveWatchlist" class="btn btn-primary" class="save-watchlist-btn">Save list</button>
    </div>

    <div class="divider"></div>
    <p class="tip">💡 Competitors on the list will be highlighted in orange</p>
    <div class="kofi-wrapper">
      <a href='https://ko-fi.com/T6O6208CUN' target='_blank'>
        <img height='36' style='border:0px;height:36px;' src='https://storage.ko-fi.com/cdn/kofi6.png?v=6' border='0' alt='Buy Me a Coffee at ko-fi.com' />
      </a>
    </div>
    <p class="credit-line">Created by Biren</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
